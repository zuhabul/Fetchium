name: Release

# Triggered automatically by release-please when a Release PR is merged.
# Also triggered manually on any v* tag push for hotfixes.
#
# Flow:
#   1. Conventional commit merged to main
#   2. release-please creates/updates "Release PR"
#   3. Release PR merged → release-please creates GitHub Release + tag
#   4. This workflow fires → builds binaries for all platforms
#   5. Binaries uploaded to GitHub Release
#   6. npm package published
#   7. Homebrew tap updated
#   8. cargo-binstall metadata is already in Cargo.toml

on:
  release:
    types: [published]
  # Allow manual dispatch for emergency hotfixes
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.2.3)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Build cross-platform release binaries
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: fetchium-linux-x64
            cross: false

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: fetchium-linux-arm64
            cross: true

          - target: x86_64-apple-darwin
            os: macos-14
            artifact: fetchium-darwin-x64
            cross: false

          - target: aarch64-apple-darwin
            os: macos-14
            artifact: fetchium-darwin-arm64
            cross: false

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: fetchium-win-x64
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up build cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross (ARM Linux only)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p fetchium-cli
          else
            cargo build --release --target ${{ matrix.target }} -p fetchium-cli
          fi

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/fetchium"
          cp "$BIN" fetchium
          tar czf "${{ matrix.artifact }}.tar.gz" fetchium
          shasum -a 256 "${{ matrix.artifact }}.tar.gz" | awk '{print $1}' > "${{ matrix.artifact }}.tar.gz.sha256"
          echo "SHA256=$(cat ${{ matrix.artifact }}.tar.gz.sha256)" >> $GITHUB_ENV

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "target/${{ matrix.target }}/release/fetchium.exe"
          Copy-Item $src fetchium.exe
          Compress-Archive -Path fetchium.exe -DestinationPath "${{ matrix.artifact }}.zip" -Force
          $hash = (Get-FileHash "${{ matrix.artifact }}.zip" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "${{ matrix.artifact }}.zip.sha256" -Value $hash

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.zip.sha256

  # ─────────────────────────────────────────────────────────────
  # 2. Attach binaries to the GitHub Release
  # ─────────────────────────────────────────────────────────────
  attach-release-assets:
    name: Attach binaries to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # 3. Publish npm package
  # ─────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: attach-release-assets
    runs-on: ubuntu-latest
    if: "!contains(github.event.release.tag_name, '-rc') && !contains(github.event.release.tag_name, '-beta')"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Sync version into npm package
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          # Update package.json version to match release
          cd packages/npm
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "npm package version set to ${VERSION}"

      - name: Publish to npm
        run: npm publish packages/npm --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-python-adapters:
    name: Publish Python adapters
    needs: attach-release-assets
    runs-on: ubuntu-latest
    if: "!contains(github.event.release.tag_name, '-rc') && !contains(github.event.release.tag_name, '-beta')"
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_dir: adapters/langchain
            package_name: fetchium-langchain
          - package_dir: adapters/crewai
            package_name: fetchium-crewai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync version into adapter package
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          python - <<'PY'
          import pathlib
          import re
          package_dir = pathlib.Path("${{ matrix.package_dir }}")
          pyproject = package_dir / "pyproject.toml"
          content = pyproject.read_text()
          updated = re.sub(r'^version = "[^"]+"$', f'version = "{VERSION}"', content, count=1, flags=re.M)
          pyproject.write_text(updated)
          print(f"adapter version set to {VERSION} for {pyproject}")
          PY

      - name: Build adapter package
        run: |
          python -m pip install --upgrade pip build twine
          python -m build ${{ matrix.package_dir }}
          python -m twine check ${{ matrix.package_dir }}/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.package_dir }}/dist
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # 4. Update Homebrew tap formula
  # ─────────────────────────────────────────────────────────────
  update-homebrew:
    name: Update Homebrew Tap
    needs: attach-release-assets
    runs-on: ubuntu-latest
    if: "!contains(github.event.release.tag_name, '-rc') && !contains(github.event.release.tag_name, '-beta')"
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts for SHA256
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256s and generate formula
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/zuhabul/fetchium/releases/download/${TAG}"

          SHA_LINUX_X64=$(cat artifacts/fetchium-linux-x64.tar.gz.sha256)
          SHA_LINUX_ARM64=$(cat artifacts/fetchium-linux-arm64.tar.gz.sha256)
          SHA_DARWIN_X64=$(cat artifacts/fetchium-darwin-x64.tar.gz.sha256)
          SHA_DARWIN_ARM64=$(cat artifacts/fetchium-darwin-arm64.tar.gz.sha256)

          cat > fetchium.rb << EOF
          class Fetchium < Formula
            desc "Fetchium CLI — AI-native federated search engine"
            homepage "https://fetchium.com"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE_URL}/fetchium-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "${BASE_URL}/fetchium-darwin-x64.tar.gz"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE_URL}/fetchium-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "${BASE_URL}/fetchium-linux-x64.tar.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              bin.install "fetchium"
            end

            test do
              assert_match "fetchium ${VERSION}", shell_output("#{bin}/fetchium --version")
            end
          end
          EOF

          echo "Generated formula for fetchium ${VERSION}"
          cat fetchium.rb

      - name: Push to Homebrew tap repository
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source_file: fetchium.rb
          destination_repo: zuhabul/homebrew-fetchium
          destination_branch: main
          destination_folder: Formula
          user_email: "github-actions[bot]@users.noreply.github.com"
          user_name: "github-actions[bot]"
          commit_message: "chore: update fetchium to ${{ github.event.release.tag_name }}"

  # ─────────────────────────────────────────────────────────────
  # 5. Post-release summary
  # ─────────────────────────────────────────────────────────────
  release-summary:
    name: Release Summary
    needs: [publish-npm, publish-python-adapters, update-homebrew]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "## Release ${TAG} Distribution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Channel | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ✅ Binaries attached |" >> $GITHUB_STEP_SUMMARY
          echo "| npm \`fetchium\` | ${{ needs.publish-npm.result == 'success' && '✅ Published' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PyPI \`fetchium-langchain\` / \`fetchium-crewai\` | ${{ needs.publish-python-adapters.result == 'success' && '✅ Published' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Homebrew \`zuhabul/tap/fetchium\` | ${{ needs.update-homebrew.result == 'success' && '✅ Updated' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| cargo-binstall | ✅ Metadata in Cargo.toml |" >> $GITHUB_STEP_SUMMARY
          echo "| Shell installer | ✅ install.fetchium.com |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install commands" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Shell (Linux/macOS)" >> $GITHUB_STEP_SUMMARY
          echo "curl -sSf https://install.fetchium.com | sh" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# npm / npx" >> $GITHUB_STEP_SUMMARY
          echo "npm install -g fetchium" >> $GITHUB_STEP_SUMMARY
          echo "npx fetchium --help" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Python adapters" >> $GITHUB_STEP_SUMMARY
          echo "pip install fetchium-langchain[rest]" >> $GITHUB_STEP_SUMMARY
          echo "pip install fetchium-crewai[rest]" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Homebrew (macOS/Linux)" >> $GITHUB_STEP_SUMMARY
          echo "brew install zuhabul/tap/fetchium" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# cargo-binstall" >> $GITHUB_STEP_SUMMARY
          echo "cargo binstall fetchium" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
