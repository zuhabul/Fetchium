version: 1
project: fetchium-io-hv

identity:
  prefer: [spiffe, universal]
  spiffe_id: "spiffe://zuhabul.com/project/fetchium"

deliver:
  mode: env
  refresh: restart
  path: /home/echo/.fetchium/env
  target_service: fetchium-secretops-refresh.service

secrets:
  - name: fetchium_runtime
    class: static
    environment: prod
    secret_path: /
    outputs:
      FETCHIUM_ADMIN_SECRET: FETCHIUM_ADMIN_SECRET
      FETCHIUM_ADMIN_SECRET_PREVIOUS: FETCHIUM_ADMIN_SECRET_PREVIOUS
      FETCHIUM_ADMIN_BOOTSTRAP_SECRET: FETCHIUM_ADMIN_BOOTSTRAP_SECRET
      ADMIN_SESSION_SECRET: ADMIN_SESSION_SECRET
      ADMIN_SESSION_SECRET_PREVIOUS: ADMIN_SESSION_SECRET_PREVIOUS
      AUTH_SECRET: AUTH_SECRET
      NEXTAUTH_SECRET: NEXTAUTH_SECRET
      FETCHIUM_DASHBOARD_AUTH_SECRET: FETCHIUM_DASHBOARD_AUTH_SECRET
      FETCHIUM_DASHBOARD_ENABLE_ADMIN_KEYS: FETCHIUM_DASHBOARD_ENABLE_ADMIN_KEYS
      FETCHIUM_INTERNAL_API_URL: FETCHIUM_INTERNAL_API_URL
      FETCHIUM_API_BASE_URL: FETCHIUM_API_BASE_URL
      SEARXNG_URL: SEARXNG_URL
      RUST_LOG: RUST_LOG

  - name: search
    class: brokered
    broker: search-gateway
    outputs:
      endpoint: SEARCH_GATEWAY_URL
      key: SEARCH_GATEWAY_KEY

rollback:
  on_failure: keep_previous
  max_retries: 3
