# SearXNG settings for Fetchium.
# NOTE: DataImpulse HTTP proxy returns 407 NO_USER inside Docker (httpx CONNECT
# tunnel does not forward Proxy-Authorization). Proxy removed — Google/DDG may
# CAPTCHA but Yahoo, Yandex, Bing, Brave, Startpage work reliably direct.
# fetchium-core's own scrapers handle Google/DDG with working residential proxy.

use_default_settings:
  engines:
    keep_only:
      - startpage
      - duckduckgo
      - brave
      - yahoo
      - yandex
      - bing
      - currency
      - youtube
      - stackoverflow
      - github

general:
  instance_name: "Fetchium Local"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

server:
  secret_key: "fetchium-searxng-local-secret-key-replace-in-prod-7f8d92a1b3e4c5d6"
  limiter: false
  image_proxy: false
  http_protocol_version: "1.1"
  method: "GET"

ui:
  static_use_hash: true
  default_locale: "en"
  default_theme: simple

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "auto"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 60
  suspended_times:
    SearxEngineAccessDenied: 60
    SearxEngineCaptcha: 120
    SearxEngineTooManyRequests: 60
    cf_SearxEngineCaptcha: 300
    cf_SearxEngineAccessDenied: 120
    recaptcha_SearxEngineCaptcha: 600
  formats:
    - html
    - json

engines:
  # Startpage — Google proxy, works without residential IP
  - name: startpage
    timeout: 3.0
    weight: 2.5

  # DuckDuckGo — works direct for most queries
  - name: duckduckgo
    timeout: 3.0
    weight: 2.0

  # YouTube — video results for how-to, tutorials, and current events
  - name: youtube
    timeout: 2.0
    weight: 1.3

  # Brave — independent index, good for privacy/tech queries
  - name: brave
    timeout: 3.0
    weight: 1.5

  # Yahoo — reliable, fast, no blocks direct
  - name: yahoo
    timeout: 2.0
    weight: 1.2

  # Yandex — strong for non-English, Cyrillic, multilingual
  - name: yandex
    timeout: 2.0
    weight: 0.8

  # Bing — supplementary coverage, no blocks direct
  - name: bing
    timeout: 2.0
    weight: 0.8

outgoing:
  request_timeout: 3.0
  max_request_timeout: 6.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 32
  keepalive_expiry: 30.0
  retries: 1
  enable_http2: true
