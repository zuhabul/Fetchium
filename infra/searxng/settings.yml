# SearXNG settings for Fetchium local/prod use
# Optimized for low tail-latency + high quality JSON API retrieval.

use_default_settings:
  engines:
    # Keep a fast, high-signal engine set (Google included per requirement).
    keep_only:
      - google
      - bing
      - duckduckgo
      - brave
      - wikipedia
      - stackoverflow
      - github
      - arxiv
      - reddit
      - hackernews

general:
  instance_name: "Fetchium Local"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

server:
  # Generate: openssl rand -hex 32
  secret_key: "fetchium-searxng-local-secret-key-replace-in-prod-7f8d92a1b3e4c5d6"
  # Keep false for single-node local setup.
  # For production behind a public endpoint, set true + valkey.url.
  limiter: false
  image_proxy: false
  http_protocol_version: "1.0"
  method: "GET"

ui:
  static_use_hash: true
  default_locale: "en"
  query_in_title: false
  infinite_scroll: false
  default_theme: simple
  center_alignment: false
  results_on_new_tab: false
  simple_style: ""

search:
  safe_search: 0
  autocomplete: ""
  autocomplete_min: 4
  default_lang: "en"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  suspended_times:
    SearxEngineAccessDenied: 86400
    SearxEngineCaptcha: 86400
    SearxEngineTooManyRequests: 3600
    cf_SearxEngineCaptcha: 1296000
    cf_SearxEngineAccessDenied: 86400
    recaptcha_SearxEngineCaptcha: 604800
  formats:
    - html
    - json

# Override kept engines with tighter per-engine timeouts.
engines:
  - name: google
    timeout: 4.0

  - name: bing
    timeout: 4.0

  - name: duckduckgo
    timeout: 4.0

  - name: brave
    timeout: 4.0

  - name: wikipedia
    timeout: 4.0

  - name: stackoverflow
    timeout: 4.0

  - name: github
    timeout: 4.0

  - name: arxiv
    timeout: 5.0

  - name: reddit
    timeout: 4.0

  - name: hackernews
    timeout: 4.0

outgoing:
  # Global timeout guard. Engine timeouts above can still override downward.
  request_timeout: 4.0
  max_request_timeout: 7.0
  useragent_suffix: ""
  pool_connections: 200
  pool_maxsize: 64
  keepalive_expiry: 15.0
  retries: 1
  enable_http2: true

# Optional production hardening (recommended for public endpoints):
# valkey:
#   url: "valkey://valkey:6379/0"
