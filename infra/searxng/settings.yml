# SearXNG settings for Fetchium — residential proxy unlocks Google, DDG, Brave.
# DataImpulse residential IPs: 95-99% success vs 40-60% for datacenter.

use_default_settings:
  engines:
    keep_only:
      - google
      - startpage
      - duckduckgo
      - brave
      - yahoo
      - yandex
      - bing
      - currency
      - youtube
      - stackoverflow
      - github

general:
  instance_name: "Fetchium Local"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

server:
  secret_key: "fetchium-searxng-local-secret-key-replace-in-prod-7f8d92a1b3e4c5d6"
  limiter: false
  image_proxy: false
  http_protocol_version: "1.1"
  method: "GET"

ui:
  static_use_hash: true
  default_locale: "en"
  default_theme: simple

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "auto"
  ban_time_on_fail: 2
  max_ban_time_on_fail: 30
  suspended_times:
    SearxEngineAccessDenied: 30
    SearxEngineCaptcha: 60
    SearxEngineTooManyRequests: 30
    cf_SearxEngineCaptcha: 120
    cf_SearxEngineAccessDenied: 60
    recaptcha_SearxEngineCaptcha: 300
  formats:
    - html
    - json

engines:
  # Google — highest quality (residential proxy bypasses blocks)
  - name: google
    timeout: 2.5
    weight: 4.0

  # Startpage — Google proxy, excellent fallback when Google suspends
  - name: startpage
    timeout: 2.0
    weight: 2.0

  # DuckDuckGo — residential IPs bypass CAPTCHA, diverse results
  - name: duckduckgo
    timeout: 2.0
    weight: 1.8

  # YouTube — video results for how-to, tutorials, and current events
  - name: youtube
    timeout: 2.0
    weight: 1.3

  # Brave — independent index, good for privacy/tech queries
  - name: brave
    timeout: 2.0
    weight: 1.5

  # Yahoo — reliable, fast
  - name: yahoo
    timeout: 1.5
    weight: 1.2

  # Yandex — strong for non-English, Cyrillic, multilingual
  - name: yandex
    timeout: 1.5
    weight: 0.8

  # Bing — supplementary coverage
  - name: bing
    timeout: 1.0
    weight: 0.5

outgoing:
  request_timeout: 2.5
  max_request_timeout: 5.0
  useragent_suffix: ""
  pool_connections: 500
  pool_maxsize: 128
  keepalive_expiry: 30.0
  retries: 1
  enable_http2: true
  # DataImpulse residential proxy — ONLY Google and DDG need residential IPs.
  # Bing, Brave, Yahoo, Yandex, Startpage work fine direct → eliminates ~80% waste.
  proxies:
    https://google.com:
      - http://75e0e5b80d4d887e2f36:6703f7fe0e9ea89c@gw.dataimpulse.com:823
    https://www.google.com:
      - http://75e0e5b80d4d887e2f36:6703f7fe0e9ea89c@gw.dataimpulse.com:823
    https://html.duckduckgo.com:
      - http://75e0e5b80d4d887e2f36:6703f7fe0e9ea89c@gw.dataimpulse.com:823
    https://lite.duckduckgo.com:
      - http://75e0e5b80d4d887e2f36:6703f7fe0e9ea89c@gw.dataimpulse.com:823
