# Fetchium local/self-host stack
# Usage:
#   cp .env.example .env && nano .env
#   docker compose -f infra/docker-compose.yml up -d

services:
  # ─── Self-hosted SearXNG (free, unlimited search aggregation) ────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: fetchium-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:4040:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:4040/
    networks:
      - fetchium-internal

  # ─── Fetchium REST API ───────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: fetchium-api
    restart: unless-stopped
    ports:
      - "3050:3050"
    volumes:
      - fetchium-data:/data
    environment:
      - FETCHIUM_DATA_DIR=/data
      - SEARXNG_URL=http://searxng:8080
      # Copy from .env:
      - FETCHIUM_ADMIN_SECRET=${FETCHIUM_ADMIN_SECRET}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
      - RUST_LOG=${RUST_LOG:-info}
    depends_on:
      - searxng
    networks:
      - fetchium-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3050/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  fetchium-internal:
    driver: bridge

volumes:
  fetchium-data:
