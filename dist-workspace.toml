[dist]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
cargo-dist-version = "0.27"
ci = "github"

[dist.artifacts]
archives = true
checksum = "sha256"

[dist.builds]
cargo = [{ package = "fetchium-cli" }]
