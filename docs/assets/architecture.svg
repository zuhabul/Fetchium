<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 760" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1224"/>
      <stop offset="1" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="stage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2440"/>
      <stop offset="1" stop-color="#151d36"/>
    </linearGradient>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="760" rx="20" fill="url(#bg)"/>
  <rect x="0" y="0" width="1240" height="6" fill="url(#accent)"/>

  <!-- Title -->
  <text x="40" y="58" fill="#e8edf7" font-size="30" font-weight="700">Fetchium</text>
  <text x="172" y="58" fill="#8b97b3" font-size="19">— the universal retrieval layer</text>
  <text x="40" y="84" fill="#5f6c8c" font-size="14.5" letter-spacing="0.5">find → extract → distill → rank → validate → cite → package, for humans and AI agents</text>

  <!-- Consumer interfaces -->
  <g>
    <text x="40" y="128" fill="#64748b" font-size="13" font-weight="600" letter-spacing="2">INTERFACES</text>
    <g>
      <rect x="40" y="142" width="150" height="48" rx="10" fill="#152042" stroke="#2b3a63"/>
      <text x="115" y="166" fill="#cdd7ee" font-size="15" font-weight="600" text-anchor="middle">CLI</text>
      <text x="115" y="182" fill="#6b7aa0" font-size="11" text-anchor="middle">fetchium …</text>
    </g>
    <g>
      <rect x="206" y="142" width="150" height="48" rx="10" fill="#152042" stroke="#2b3a63"/>
      <text x="281" y="166" fill="#cdd7ee" font-size="15" font-weight="600" text-anchor="middle">REST API</text>
      <text x="281" y="182" fill="#6b7aa0" font-size="11" text-anchor="middle">fetchium-api</text>
    </g>
    <g>
      <rect x="372" y="142" width="170" height="48" rx="10" fill="#13243f" stroke="#22d3ee" stroke-opacity="0.55"/>
      <text x="457" y="166" fill="#9beaf3" font-size="15" font-weight="600" text-anchor="middle">MCP server</text>
      <text x="457" y="182" fill="#6b7aa0" font-size="11" text-anchor="middle">Codex · Claude · agents</text>
    </g>
  </g>

  <!-- Engine panel -->
  <rect x="40" y="214" width="1160" height="320" rx="16" fill="#0b1020" stroke="#222d4d"/>
  <text x="62" y="244" fill="#64748b" font-size="13" font-weight="600" letter-spacing="2">fetchium-core ENGINE</text>

  <!-- Pipeline stages row 1 -->
  <g>
    <!-- Search -->
    <rect x="62" y="262" width="172" height="74" rx="11" fill="url(#stage)" stroke="#2b3a63"/>
    <text x="148" y="292" fill="#e8edf7" font-size="15.5" font-weight="700" text-anchor="middle">Search</text>
    <text x="148" y="313" fill="#8190b3" font-size="11.5" text-anchor="middle">federated backends</text>
    <text x="148" y="328" fill="#5f6c8c" font-size="10.5" text-anchor="middle">SimHash dedup</text>

    <!-- Extract -->
    <rect x="258" y="262" width="182" height="74" rx="11" fill="url(#stage)" stroke="#6366f1" stroke-opacity="0.6"/>
    <text x="349" y="290" fill="#e8edf7" font-size="15.5" font-weight="700" text-anchor="middle">Extract · CEP</text>
    <text x="349" y="311" fill="#8190b3" font-size="11.5" text-anchor="middle">5-layer cascade</text>
    <text x="349" y="326" fill="#5f6c8c" font-size="10.5" text-anchor="middle">+ QADD distillation</text>

    <!-- Budget -->
    <rect x="464" y="262" width="182" height="74" rx="11" fill="url(#stage)" stroke="#2b3a63"/>
    <text x="555" y="290" fill="#e8edf7" font-size="15.5" font-weight="700" text-anchor="middle">Token budget</text>
    <text x="555" y="311" fill="#8190b3" font-size="11.5" text-anchor="middle">QATBE + SCS</text>
    <text x="555" y="326" fill="#5f6c8c" font-size="10.5" text-anchor="middle">BM25 · knapsack</text>

    <!-- Rank -->
    <rect x="670" y="262" width="182" height="74" rx="11" fill="url(#stage)" stroke="#22d3ee" stroke-opacity="0.55"/>
    <text x="761" y="290" fill="#e8edf7" font-size="15.5" font-weight="700" text-anchor="middle">Rank · HyperFusion</text>
    <text x="761" y="311" fill="#8190b3" font-size="11.5" text-anchor="middle">8 fused signals</text>
    <text x="761" y="326" fill="#5f6c8c" font-size="10.5" text-anchor="middle">relevance + trust</text>

    <!-- Validate+Cite+Output stacked as one -->
    <rect x="876" y="262" width="302" height="74" rx="11" fill="url(#stage)" stroke="#2b3a63"/>
    <text x="1027" y="290" fill="#e8edf7" font-size="15.5" font-weight="700" text-anchor="middle">Validate → Cite → Package</text>
    <text x="1027" y="311" fill="#8190b3" font-size="11.5" text-anchor="middle">evidence-checked, source-cited output</text>
    <text x="1027" y="326" fill="#5f6c8c" font-size="10.5" text-anchor="middle">PDS tiers: key_facts · summary · detailed · complete</text>

    <!-- arrows -->
    <line x1="234" y1="299" x2="256" y2="299" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
    <line x1="440" y1="299" x2="462" y2="299" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
    <line x1="646" y1="299" x2="668" y2="299" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
    <line x1="852" y1="299" x2="874" y2="299" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  </g>

  <!-- CEP cascade detail -->
  <g>
    <text x="62" y="372" fill="#64748b" font-size="12.5" font-weight="600" letter-spacing="1.5">CEP — adaptive extraction cascade (escalates only as far as needed)</text>
    <g font-size="11.5">
      <rect x="62"  y="384" width="206" height="34" rx="8" fill="#13203f" stroke="#2b3a63"/><text x="74" y="406" fill="#cdd7ee">L1 · CSS selectors <tspan fill="#5f6c8c">(~85%)</tspan></text>
      <rect x="278" y="384" width="206" height="34" rx="8" fill="#13203f" stroke="#2b3a63"/><text x="290" y="406" fill="#cdd7ee">L2 · streaming rewriter</text>
      <rect x="494" y="384" width="206" height="34" rx="8" fill="#13203f" stroke="#2b3a63"/><text x="506" y="406" fill="#cdd7ee">L3 · headless JS render</text>
      <rect x="710" y="384" width="206" height="34" rx="8" fill="#13203f" stroke="#2b3a63"/><text x="722" y="406" fill="#cdd7ee">L4 · PDF / documents</text>
      <rect x="926" y="384" width="252" height="34" rx="8" fill="#13203f" stroke="#2b3a63"/><text x="938" y="406" fill="#cdd7ee">L5 · screenshot OCR (last resort)</text>
    </g>
  </g>

  <!-- Intelligence / loop band -->
  <g>
    <rect x="62" y="438" width="1116" height="78" rx="12" fill="#0e1730" stroke="#1e2a4a"/>
    <text x="80" y="464" fill="#64748b" font-size="12.5" font-weight="600" letter-spacing="1.5">ADAPTIVE LAYER</text>
    <g font-size="12">
      <rect x="80"  y="474" width="250" height="32" rx="8" fill="#16223f" stroke="#2b3a63"/><text x="92" y="495" fill="#cdd7ee">AMRS — multi-agent research swarm</text>
      <rect x="344" y="474" width="240" height="32" rx="8" fill="#16223f" stroke="#2b3a63"/><text x="356" y="495" fill="#cdd7ee">PIE — cross-session learning</text>
      <rect x="598" y="474" width="210" height="32" rx="8" fill="#16223f" stroke="#2b3a63"/><text x="610" y="495" fill="#cdd7ee">RAR — retry &amp; refine</text>
      <rect x="822" y="474" width="160" height="32" rx="8" fill="#16223f" stroke="#2b3a63"/><text x="834" y="495" fill="#cdd7ee">cache · index</text>
      <rect x="996" y="474" width="166" height="32" rx="8" fill="#16223f" stroke="#2b3a63"/><text x="1008" y="495" fill="#cdd7ee">circuit breaker · bulkhead</text>
    </g>
  </g>

  <!-- interface -> engine arrow -->
  <line x1="280" y1="192" x2="280" y2="212" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>

  <!-- footer -->
  <text x="40" y="566" fill="#5f6c8c" font-size="12.5">Rust workspace · single static binary · MIT OR Apache-2.0 · github.com/zuhabul/Fetchium</text>
</svg>
